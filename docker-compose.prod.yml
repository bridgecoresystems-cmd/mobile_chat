services:
  postgres:
    image: postgres:16-alpine
    container_name: konekt_postgres
    environment:
      POSTGRES_USER:     chat_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-chat_pass}
      POSTGRES_DB:       chat_db
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat_user -d chat_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: konekt_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  chat-engine:
    image: turbo-chat-engine
    build:
      context: ../turbo-chat-engine
      dockerfile: Dockerfile
    container_name: konekt_engine
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL:         postgres://chat_user:${DB_PASSWORD:-chat_pass}@postgres:5432/chat_db
      REDIS_URL:            redis://redis:6379
      JWT_SECRET:           ${JWT_SECRET}
      RUST_LOG:             turbo_chat_engine=info
      R2_ACCOUNT_ID:        ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID:     ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET:            ${R2_BUCKET:-turbo-chat-files}
      R2_PUBLIC_URL:        ${R2_PUBLIC_URL}
      FCM_SERVICE_ACCOUNT:  ${FCM_SERVICE_ACCOUNT}
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    container_name: konekt_backend
    depends_on:
      postgres:
        condition: service_healthy
      chat-engine:
        condition: service_started
    environment:
      DATABASE_URL:     postgres://chat_user:${DB_PASSWORD:-chat_pass}@postgres:5432/chat_db
      JWT_SECRET:       ${JWT_SECRET}
      CHAT_SERVER_URL:  http://chat-engine:8080
      PORT:             3001
      RESEND_API_KEY:   ${RESEND_API_KEY}
      RESEND_FROM:      ${RESEND_FROM:-noreply@bcs301.site}
    ports:
      - "127.0.0.1:3001:3001"
    restart: unless-stopped

volumes:
  pgdata:
