server {
    listen 80;
    server_name konekt.bridgecore.tech;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name konekt.bridgecore.tech;

    ssl_certificate     /etc/letsencrypt/live/konekt.bridgecore.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/konekt.bridgecore.tech/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # HTTP API → BFF
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket upgrade (BFF proxies to Rust engine)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
